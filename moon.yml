$schema: "https://moonrepo.dev/schemas/project.json"

tags:
  - "tooling"

tasks:
  fmt:
    script: "dprint fmt"
    inputs:
      - "/**/*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,md,yml,yaml,css,scss,html,astro}"
      - "/dprint.json"
      - "/dprint.jsonc"
    options:
      runInCI: false
      runFromWorkspaceRoot: true
      affectedFiles: true

  fmt-check:
    script: "dprint check"
    inputs:
      - "/**/*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,md,yml,yaml,css,scss,html,astro}"
      - "/dprint.json"
      - "/dprint.jsonc"
    options:
      runFromWorkspaceRoot: true
      affectedFiles: true
