$schema: "https://moonrepo.dev/schemas/tasks.json"

inheritedBy:
  toolchains: ['typescript']
  order: 10
  
fileGroups:
  sources:
    - "src/**/*"
    - "src/**/*.astro"
  tests:
    - "src/**/*.spec.ts"
    - "tests/**/*"

tasks:
  check-types:
    command: "tsc"
    args: ["--noEmit"]
    toolchains: ["javascript", "node"]
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - "/tsconfig.json"
    outputs: []

  lint-ox:
    command: "oxlint"
    args: ["--config", "$workspaceRoot/oxlintrc.json"]
    toolchains: ["javascript", "node"]
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - "/oxlintrc.json"
    outputs: []
    options:
      affectedFiles: true

  lint-es:
    command: "eslint"
    args: ["-c", "$workspaceRoot/eslint.config.mjs"]
    toolchains: ["javascript", "node"]
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - "/eslint.config.mjs"
    outputs: []
    options:
      affectedFiles: true

  lint:
    command: "noop"
    deps:
      - "~:lint-ox"
      - "~:lint-es"
    options:
      runDepsInParallel: false

  test:
    command: "bun"
    args: ["test"]
    toolchains: ["bun"]
    inputs:
      - "@group(sources)"
      - "@group(tests)"

